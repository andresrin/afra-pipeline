version: 0.2

phases:
  install:
    commands:
      - echo Installing Terraform...
      - yum install -y unzip
      - curl -L -o terraform.zip https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
      - unzip -o terraform.zip
      - mv terraform /usr/local/bin/

  build:
    commands:
      - terraform version